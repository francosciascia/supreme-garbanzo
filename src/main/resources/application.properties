server.port=8083
spring.application.name=Franco
spring.profiles.default=dev

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:1234}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

logging.level.org.hibernate.SQL=${HIBERNATE_SQL_LOG:INFO}
logging.level.org.hibernate.orm.jdbc.bind=${HIBERNATE_BIND_LOG:INFO}

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# JWT Configuration
jwt.secret=${JWT_SECRET:mi-super-secreto-para-jwt-que-debe-ser-muy-largo-para-cumplir-con-los-256-bits-HS256-requeridos-para-seguridad}
jwt.expiration=${JWT_EXPIRATION:86400000}
server.servlet.session.timeout=${SESSION_TIMEOUT:30m}
app.cors.allowed-origin=${CORS_ALLOWED_ORIGIN:http://localhost:8083}
